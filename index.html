<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Risk — Evento aleatorio</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; }
      main { max-width: 760px; margin: 0 auto; }
      h1 { font-size: 20px; margin: 0 0 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
      button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .muted { opacity: 0.8; font-size: 12px; }
      .card { border: 1px solid rgba(127,127,127,.35); border-radius: 12px; padding: 16px; }
      .title { font-size: 16px; margin: 0 0 6px; }
      .meta { opacity: 0.8; font-size: 12px; margin: 0 0 12px; }
      pre { white-space: pre-wrap; margin: 0; line-height: 1.4; }
    </style>
  </head>
  <body>
    <main>
      <h1>Evento aleatorio</h1>

      <div class="row">
        <button id="btn">Sacar evento</button>
        <span class="muted" id="status"></span>
      </div>

      <section class="card" aria-live="polite">
        <p class="title" id="cardTitle">—</p>
        <p class="meta" id="cardMeta"></p>
        <pre id="cardBody"></pre>
      </section>

      <p class="muted" style="margin-top: 16px;">
        Fuente: <code id="deckPath"></code>
      </p>
    </main>

    <script src="site.js?v=1"></script>
  </body>
</html>
